<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="ubique-api-base" content="https://dev-nd.ubiquefashion.com" />
    <title>Ubique · Customer Verification</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f4f4f5;
        --card: #ffffff;
        --text: #0f1523;
        --text-muted: #6b7280;
        --text-soft: #9ca3af;
        --border: #e5e7eb;
        --green-bg: #ecfdf3;
        --green-text: #027a48;
        --green-border: #abefc6;
        --purple-bg: #f4f3ff;
        --purple-border: #e9e7ff;
        --purple-text: #5925dc;
        --purple-badge-bg: #f4f3ff;
        --purple-badge-text: #6941c6;
        --red-bg: #fef3f2;
        --red-border: #fecdca;
        --red-badge-bg: #fef3f2;
        --red-badge-text: #b42318;
        --shadow: 0 8px 32px rgba(15, 21, 35, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Inter", system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
      }

      .page {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 24px 16px 32px;
      }

      .header {
        width: 100%;
        max-width: 420px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 20px;
      }

      .brand {
        display: flex;
        align-items: baseline;
        gap: 6px;
        font-weight: 700;
        letter-spacing: 0.04em;
        font-size: 13px;
      }

      .brand-verify {
        color: var(--text-soft);
        font-weight: 600;
      }

      .boutique-name {
        font-size: 13px;
        color: var(--text-muted);
        text-align: right;
        max-width: 55%;
      }

      .card {
        width: 100%;
        max-width: 420px;
        background: var(--card);
        border-radius: 20px;
        box-shadow: var(--shadow);
        padding: 20px;
      }

      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        border-radius: 999px;
        background: var(--green-bg);
        border: 1px solid var(--green-border);
        color: var(--green-text);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin-bottom: 18px;
      }

      .status-badge svg {
        width: 14px;
        height: 14px;
        flex-shrink: 0;
      }

      .profile {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 20px;
      }

      .avatar {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        object-fit: cover;
        background: #e5e7eb;
        flex-shrink: 0;
      }

      .avatar-fallback {
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
        font-size: 18px;
        color: var(--text-muted);
      }

      .profile-name {
        margin: 0 0 4px;
        font-size: 18px;
        font-weight: 700;
        line-height: 1.2;
      }

      .profile-meta {
        margin: 0;
        font-size: 13px;
        color: var(--text-muted);
      }

      .membership-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .membership-label {
        font-size: 13px;
        color: var(--text-muted);
        font-weight: 500;
      }

      .member-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 10px;
        border-radius: 999px;
        background: var(--purple-badge-bg);
        color: var(--purple-badge-text);
        font-size: 12px;
        font-weight: 600;
      }

      .member-badge-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--purple-badge-text);
      }

      .offer-box {
        padding: 14px;
        border-radius: 14px;
        background: var(--purple-bg);
        border: 1px solid var(--purple-border);
        margin-bottom: 16px;
      }

      .offer-box.no-membership {
        background: var(--red-bg);
        border-color: var(--red-border);
      }

      .member-badge.no-membership {
        background: var(--red-badge-bg);
        color: var(--red-badge-text);
      }

      .member-badge.no-membership .member-badge-dot {
        background: var(--red-badge-text);
      }

      .verify-note {
        padding: 14px 16px;
        border-radius: 12px;
        background: #f9fafb;
        border: 1px solid var(--border);
        font-size: 13px;
        line-height: 1.5;
        color: var(--text-muted);
        margin-bottom: 18px;
      }

      .verify-note strong {
        color: var(--text);
        font-weight: 600;
      }

      .footer {
        margin-top: auto;
        padding-top: 28px;
        text-align: center;
        font-size: 11px;
        letter-spacing: 0.04em;
        color: var(--text-soft);
        text-transform: uppercase;
      }

      .hidden {
        display: none !important;
      }

      .error-state {
        width: 100%;
        max-width: 420px;
        padding: 20px;
        border-radius: 16px;
        background: #fef3f2;
        border: 1px solid #fecdca;
        color: #b42318;
        font-size: 14px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="header">
        <div class="brand">
          <span>UBIQUE</span>
          <span class="brand-verify">VERIFY</span>
        </div>
        <div class="boutique-name" id="boutiqueName"></div>
      </header>

      <main class="card hidden" id="verifyCard">
        <div class="status-badge" id="statusBadge">
          <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path
              d="M3.5 8.5L6.5 11.5L12.5 4.5"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <span>Code scanned</span>
        </div>

        <div class="profile">
          <img
            class="avatar"
            id="customerAvatar"
            src=""
            alt=""
            onerror="this.classList.add('hidden'); document.getElementById('avatarFallback').classList.remove('hidden');"
          />
          <div
            class="avatar avatar-fallback hidden"
            id="avatarFallback"
            aria-hidden="true"
          >
            CS
          </div>
          <div>
            <h1 class="profile-name" id="customerName"></h1>
            <p class="profile-meta" id="customerSince"></p>
          </div>
        </div>

        <div class="offer-box" id="offerBox">
          <div class="membership-row">
            <span class="membership-label">Membership</span>
            <span class="member-badge" id="membershipBadge">
              <span class="member-badge-dot"></span>
              <span id="membershipLabel"></span>
            </span>
          </div>
        </div>

        <p class="verify-note" id="verifyNote">
          You're verifying for
          <strong id="verifyBoutiqueName"></strong>.
          Confirm the code is shown in person by the customer.
        </p>
      </main>

      <div class="error-state hidden" id="errorState">
        Unable to load verification details. Please scan the code again.
      </div>

      <footer class="footer">
        Ubique Fashion · Customer verification for partner boutiques
      </footer>
    </div>

    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const verifyToken = params.get("token") || "";

        const API_BASE_URL =
          document.querySelector('meta[name="ubique-api-base"]')?.content ||
          window.location.origin;

        const els = {
          boutiqueName: document.getElementById("boutiqueName"),
          customerName: document.getElementById("customerName"),
          customerSince: document.getElementById("customerSince"),
          customerAvatar: document.getElementById("customerAvatar"),
          avatarFallback: document.getElementById("avatarFallback"),
          membershipLabel: document.getElementById("membershipLabel"),
          membershipBadge: document.getElementById("membershipBadge"),
          offerBox: document.getElementById("offerBox"),
          verifyBoutiqueName: document.getElementById("verifyBoutiqueName"),
          errorState: document.getElementById("errorState"),
          verifyCard: document.getElementById("verifyCard"),
        };

        function getInitials(name) {
          return (name || "")
            .split(" ")
            .filter(Boolean)
            .slice(0, 2)
            .map((part) => part[0]?.toUpperCase() || "")
            .join("");
        }

        function formatMemberSince(dateValue) {
          if (!dateValue) return "Ubique customer";
          const date = new Date(dateValue);
          if (Number.isNaN(date.getTime())) return "Ubique customer";
          return `Ubique customer since ${date.toLocaleDateString("en-US", {
            month: "long",
            year: "numeric",
          })}`;
        }

        function isTokenExpired(token) {
          try {
            const payload = JSON.parse(atob(token.split(".")[1]));
            return payload.exp * 1000 < Date.now();
          } catch (error) {
            return true;
          }
        }

        function showError(message) {
          els.verifyCard.classList.add("hidden");
          els.errorState.textContent =
            message ||
            "Unable to load verification details. Please scan the code again.";
          els.errorState.classList.remove("hidden");
        }

        function applyData(data) {
          els.verifyCard.dataset.boutiqueId = data.boutique_id || "";
          els.boutiqueName.textContent = data.boutique_name;
          els.verifyBoutiqueName.textContent = data.boutique_name;
          els.customerName.textContent = data.customer_name;
          els.customerSince.textContent = formatMemberSince(data.member_since);
          els.membershipLabel.textContent = data.membership_label;

          const hasMembership = Boolean(data.has_membership);
          els.offerBox.classList.toggle("no-membership", !hasMembership);
          els.membershipBadge.classList.toggle("no-membership", !hasMembership);

          if (data.avatar_url) {
            els.customerAvatar.src = data.avatar_url;
            els.customerAvatar.alt = data.customer_name;
            els.customerAvatar.classList.remove("hidden");
            els.avatarFallback.classList.add("hidden");
          } else {
            els.customerAvatar.classList.add("hidden");
            els.avatarFallback.classList.remove("hidden");
            els.avatarFallback.textContent = getInitials(data.customer_name);
          }

          els.verifyCard.classList.remove("hidden");
          document.title = `Ubique · ${data.customer_name}`;
        }

        async function loadVerifyDetails() {
          if (!verifyToken) {
            showError("No verification token found. Please scan the code again.");
            return;
          }

          if (isTokenExpired(verifyToken)) {
            showError(
              "This verification link has expired. Please scan the code again."
            );
            return;
          }

          try {
            const response = await fetch(
              `${API_BASE_URL}/verify/details?token=${encodeURIComponent(verifyToken)}`
            );

            const payload = await response.json();
            const data = payload?.data;

            if (!response.ok || !data) {
              const apiMessage = payload?.message || "";
              if (response.status === 401 && /expired/i.test(apiMessage)) {
                showError(
                  "This verification link has expired. Please scan the code again."
                );
                return;
              }
              showError();
              return;
            }

            applyData(data);
          } catch (error) {
            showError(
              "Unable to reach the verification service. Please try again."
            );
          }
        }

        loadVerifyDetails();
      })();
    </script>
  </body>
</html>
